<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Random Image</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>

<img id="img">

<script>
const images = [
  "https://i.pinimg.com/736x/e7/7a/15/e77a15cefb2876eeb951fe030dd3f303.jpg",
  "https://i.pinimg.com/736x/db/72/44/db724453f68b3d0fd59622ac7dc9e86d.jpg",
  "https://i.pinimg.com/736x/0d/69/98/0d69981a011543a54b2c96014c336e3d.jpg",
  "https://i.pinimg.com/736x/70/31/71/7031717d9ccd13eb8161c02284b87574.jpg",
  "https://i.pinimg.com/736x/81/5a/99/815a995a72bdfefa666695006ffcf7f4.jpg",
  "https://i.pinimg.com/736x/a6/cc/52/a6cc52eb12a368566ea197b16af96892.jpg",
  "https://i.pinimg.com/736x/23/2b/b3/232bb3dcf31723cd63cd991467bb94a4.jpg",
  "https://i.pinimg.com/736x/91/ba/f6/91baf6000240d763e1563c628d47b831.jpg"
];

const randomIndex = Math.floor(Math.random() * images.length);
document.getElementById("img").src = images[randomIndex];
</script>

</body>
</html>
